name: Mago

on:
  push:
    branches-ignore:
      - 'docs/**'
    paths:
      - '**.php'
      - 'mago.toml'
  workflow_dispatch: ~

jobs:
  mago:
    name: Mago Linter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none
        env:
          COMPOSER_ALLOW_SUPERUSER: 1

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Restore Composer cache
        id: composer-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist

      - name: Save Composer cache
        if: always() && steps.composer-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-8.2-${{ hashFiles('composer.json') }}

      - name: Setup Mago
        uses: nhedger/setup-mago@v1

      - name: Run Mago Lint (PHP 8.2)
        run: mago lint --minimum-fail-level note --reporting-format github
        env:
          MAGO_PHP_VERSION: '8.2'

      - name: Run Mago Lint (PHP 8.3)
        run: mago lint --minimum-fail-level note --reporting-format github
        env:
          MAGO_PHP_VERSION: '8.3'

      - name: Run Mago Lint (PHP 8.4)
        run: mago lint --minimum-fail-level note --reporting-format github
        env:
          MAGO_PHP_VERSION: '8.4'
