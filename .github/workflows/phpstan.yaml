name: PHPStan

on:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - 'docs/**'

jobs:
  phpstan:
    name: PHPStan (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php-version }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer update --no-progress --prefer-dist

      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: /tmp/phpstan
          key: phpstan-${{ matrix.php-version }}-${{ github.sha }}
          restore-keys: phpstan-${{ matrix.php-version }}-

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
